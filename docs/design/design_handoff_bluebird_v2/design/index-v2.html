<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Project Bluebird — App UI Kit v2 (TDS-influenced)</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: #EEF1F5; font-family: "Pretendard Variable", Pretendard, -apple-system, system-ui, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 32px 16px; -webkit-font-smoothing: antialiased; }
  #root { display: flex; flex-direction: column; align-items: center; gap: 18px; }
  .nav-rail { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; max-width: 420px; }
  .nav-rail button { font-family: inherit; font-size: 12px; font-weight: 600; letter-spacing: -0.01em; padding: 7px 14px; border-radius: 9999px; cursor: pointer; border: 1px solid #E2E8F0; background: #fff; color: #475569; transition: all .15s; }
  .nav-rail button.on { background: #1E40AF; color: #fff; border-color: #1E40AF; }
  .kit-cap { font-size: 11px; color: #94A3B8; text-align: center; max-width: 402px; line-height: 1.5; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="AppShell.jsx"></script>
<script type="text/babel" src="TdsKit.jsx"></script>
<script type="text/babel" src="ScreensV2A.jsx"></script>
<script type="text/babel" src="ScreensV2B.jsx"></script>
<script type="text/babel" src="ScreensV2C.jsx"></script>
<script type="text/babel" src="ScreensV2D.jsx"></script>
<script type="text/babel" src="ScreensV2E.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;
const { IOSDevice, BottomTab, LandingV2, DashboardV2, LogFlowV2, AnalyzeV2, InsightsV2, JournalV2, VisualizeV2, MeV2, ActionV2 } = window;

const SCREENS = [['landing', '랜딩'], ['dashboard', '대시보드'], ['log', '생각 기록'], ['analyze', '분석 결과'], ['visualize', '시각화'], ['action', '행동 확약'], ['insights', '인사이트'], ['journal', '일지'], ['me', '나']];
const TAB_SCREENS = ['dashboard', 'insights', 'journal', 'me'];

function App() {
  const [screen, setScreen] = useState('landing');
  const go = (s) => { setScreen(s); document.querySelector('.ios-scroll')?.scrollTo(0, 0); };
  useEffect(() => { window.lucide && window.lucide.createIcons(); });

  let body;
  if (screen === 'landing') body = <LandingV2 go={go} />;
  else if (screen === 'log') body = <LogFlowV2 go={go} />;
  else if (screen === 'analyze') body = <AnalyzeV2 go={go} />;
  else if (screen === 'visualize') body = <VisualizeV2 go={go} />;
  else if (screen === 'action') body = <ActionV2 go={go} />;
  else if (screen === 'insights') body = <InsightsV2 go={go} />;
  else if (screen === 'journal') body = <JournalV2 go={go} />;
  else if (screen === 'me') body = <MeV2 go={go} />;
  else body = <DashboardV2 go={go} />;

  const showTab = TAB_SCREENS.includes(screen);
  return (
    <React.Fragment>
      <div className="nav-rail">
        {SCREENS.map(([id, label]) => (
          <button key={id} className={(screen === id || (id === 'dashboard' && showTab)) ? 'on' : ''} onClick={() => go(id)}>{label}</button>
        ))}
      </div>
      <IOSDevice>
        <div className="ios-scroll" style={{ height: '100%', overflow: 'auto', position: 'relative' }}>
          {body}
          {showTab && <BottomTab active={TAB_SCREENS.includes(screen) ? screen : 'dashboard'} onNav={(t) => go(t)} onFab={() => go('log')} />}
        </div>
      </IOSDevice>
      <p className="kit-cap">v2 · TDS 구조 원칙(BottomCTA · 큰 Top 타이틀 · ListRow/ListHeader · 묵직한 버튼)을 블루버드 스타일로 재해석. 상단 칩으로 화면 전환.</p>
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
